name: "Release Kindle 3 NetSurf Toolchain"

on: 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bison build-essential flex git gperf pkg-config \
            libhtml-parser-perl libexpat1-dev curl tar bzip2

      - name: Setup Environment and SDK
        run: |
          # Decodes and runs the setup, download, and SDK build logic
          echo "" | base64 -d | bash

      - name: Archive and Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: k3-toolchain-${{ github.run_number }}
          name: "Kindle 3 NetSurf Toolchain v${{ github.run_number }}"
          body: |
            ### Kindle 3 (ARMv6) Toolchain
            - **Compiler**: KOReader (GCC 13+)
            - **SDK**: NetSurf Static Libraries (Expat, Curl, OpenSSL, PNG, etc.)
            - **Target Path**: `/opt/netsurf/arm-kindle-linux-gnueabi/env`
          files: |
            arm-kindle-linux-gnueabi-full.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The archive command is inside the release logic to ensure paths are preserved
        run: |
          tar -czf arm-kindle-linux-gnueabi-full.tar.gz /opt/netsurf /opt/x-tools
